<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image → Video</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.card {
  background: #1e293b;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
  font-size: 18px;
  margin-bottom: 16px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 14px;
  margin-bottom: 12px;
  background: #0f172a;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #2563eb;
}

button:active {
  transform: scale(0.98);
}

video {
  width: 100%;
  margin-top: 16px;
  border-radius: 12px;
  background: black;
}

.status {
  margin-top: 12px;
  text-align: center;
  font-size: 13px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>Image → 5s Video</h1>

    <input id="urlInput" type="text" placeholder="Paste image URL...">
    <button id="startBtn">Generate Video</button>

    <div class="status" id="status"></div>

    <video id="video" controls loop></video>
  </div>
</div>

<script>
// 🔥 CORS proxy
function proxyUrl(url) {
  return "https://cors.excuse.workers.dev/?url=" + encodeURIComponent(url);
}

// 🔥 Get image URL from query OR path
function getImageUrl() {
  const url = new URL(window.location.href);

  // 1. ?img=
  const imgParam = url.searchParams.get("img");
  if (imgParam) return imgParam;

  // 2. Path fallback
  let path = url.pathname.slice(1);
  if (!path) return null;

  try {
    path = decodeURIComponent(path);
  } catch {}

  // If already full URL
  if (path.startsWith("http://") || path.startsWith("https://")) {
    return path;
  }

  // Otherwise assume https
  return "https://" + path;
}

const input = document.getElementById("urlInput");
const button = document.getElementById("startBtn");
const video = document.getElementById("video");
const status = document.getElementById("status");

// Auto-fill from URL
const initialUrl = getImageUrl();
if (initialUrl) {
  input.value = initialUrl;
}

// Optional auto-start
// if (initialUrl) button.click();

button.onclick = async () => {
  const rawUrl = input.value.trim();
  if (!rawUrl) {
    alert("Enter image URL");
    return;
  }

  status.textContent = "Loading image...";

  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = proxyUrl(rawUrl);

  img.onload = async () => {
    status.textContent = "Processing video...";

    const maxSize = 1280;

    let width = img.naturalWidth;
    let height = img.naturalHeight;

    // Keep ratio with max size
    if (width > maxSize || height > maxSize) {
      const scale = Math.min(maxSize / width, maxSize / height);
      width = Math.round(width * scale);
      height = Math.round(height * scale);
    }

    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");

    const fps = 30;
    const duration = 5;
    const totalFrames = fps * duration;

    const stream = canvas.captureStream(fps);
    const recorder = new MediaRecorder(stream, {
      mimeType: "video/webm"
    });

    const chunks = [];

    recorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.start();

    for (let i = 0; i < totalFrames; i++) {
      ctx.clearRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      await new Promise(requestAnimationFrame);
    }

    recorder.stop();

    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      const url = URL.createObjectURL(blob);
      video.src = url;
      status.textContent = "Done ✅";
    };
  };

  img.onerror = () => {
    status.textContent = "";
    alert("Failed to load image.\nEnable CORS Anywhere or try another image.");
  };
};
</script>

</body>
</html>
