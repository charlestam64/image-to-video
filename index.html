<script>
function proxyUrl(url) {
  return "https://cors-anywhere.com/" + url;
}

// 🔥 Get image URL from either ?img= or path
function getImageUrl() {
  const url = new URL(window.location.href);

  // 1. Query param takes priority
  const imgParam = url.searchParams.get("img");
  if (imgParam) return imgParam;

  // 2. Fallback: use pathname (remove leading "/")
  let path = url.pathname.slice(1);

  if (!path) return null;

  // Decode URL (important!)
  try {
    return decodeURIComponent(path);
  } catch {
    return path;
  }
}

const input = document.getElementById("urlInput");
const button = document.getElementById("startBtn");
const video = document.getElementById("video");
const status = document.getElementById("status");

// 🔥 Auto-fill input if URL detected
const initialUrl = getImageUrl();
if (initialUrl) {
  input.value = initialUrl;
}

button.onclick = async () => {
  const rawUrl = input.value.trim();
  if (!rawUrl) {
    alert("Enter image URL");
    return;
  }

  status.textContent = "Loading image...";

  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = proxyUrl(rawUrl);

  img.onload = async () => {
    status.textContent = "Processing video...";

    const maxSize = 1280;

    let width = img.naturalWidth;
    let height = img.naturalHeight;

    if (width > maxSize || height > maxSize) {
      const scale = Math.min(maxSize / width, maxSize / height);
      width = Math.round(width * scale);
      height = Math.round(height * scale);
    }

    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");

    const fps = 30;
    const duration = 5;
    const totalFrames = fps * duration;

    const stream = canvas.captureStream(fps);
    const recorder = new MediaRecorder(stream, {
      mimeType: "video/webm"
    });

    const chunks = [];

    recorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.start();

    for (let i = 0; i < totalFrames; i++) {
      ctx.clearRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      await new Promise(requestAnimationFrame);
    }

    recorder.stop();

    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      const url = URL.createObjectURL(blob);
      video.src = url;
      status.textContent = "Done ✅";
    };
  };

  img.onerror = () => {
    status.textContent = "";
    alert("Failed to load image (enable cors-anywhere)");
  };
};
</script>
