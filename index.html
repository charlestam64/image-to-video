<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image → Loop Video</title>
</head>
<body>

<canvas id="canvas" width="640" height="360"></canvas>
<br>
<video id="video" controls loop></video>
<br>
<button id="download">Download</button>

<script>
function getQueryParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

function proxyUrl(url) {
  return "https://cors-anywhere.com/" + url;
}

const rawUrl = getQueryParam("img");
if (!rawUrl) {
  alert("Use ?img=https://...");
  throw new Error("Missing image URL");
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const video = document.getElementById("video");
const downloadBtn = document.getElementById("download");

const img = new Image();
img.crossOrigin = "anonymous";
img.src = proxyUrl(rawUrl);

img.onload = async () => {
  const fps = 30;
  const duration = 5; // seconds
  const totalFrames = fps * duration;

  const stream = canvas.captureStream(fps);
  const recorder = new MediaRecorder(stream, {
    mimeType: "video/webm"
  });

  const chunks = [];

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.start();

  // Draw same frame repeatedly (static video)
  for (let i = 0; i < totalFrames; i++) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const scale = Math.min(
      canvas.width / img.width,
      canvas.height / img.height
    );

    const x = (canvas.width - img.width * scale) / 2;
    const y = (canvas.height - img.height * scale) / 2;

    ctx.drawImage(
      img,
      0, 0, img.width, img.height,
      x, y, img.width * scale, img.height * scale
    );

    await new Promise(r => setTimeout(r, 1000 / fps));
  }

  recorder.stop();

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);

    video.src = url;

    downloadBtn.onclick = () => {
      const a = document.createElement("a");
      a.href = url;
      a.download = "video.webm";
      a.click();
    };
  };
};

img.onerror = () => {
  alert("Image failed (enable cors-anywhere first)");
};
</script>

</body>
</html>
