<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image → Video (with proxy)</title>
</head>
<body>

<canvas id="canvas" width="640" height="360"></canvas>
<br>
<video id="video" controls loop></video>

<script>
function getQueryParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

// 🔥 CHANGE THIS if proxy dies
function proxyUrl(url) {
  return "https://proxy.cors.sh/" + url;
}

const rawUrl = getQueryParam("img");

if (!rawUrl) {
  alert("Use ?img=https://...");
  throw new Error("Missing image URL");
}

const imageUrl = proxyUrl(rawUrl);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const video = document.getElementById("video");

const img = new Image();
img.crossOrigin = "anonymous"; // still required

img.src = imageUrl;

img.onload = () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const scale = Math.min(
    canvas.width / img.width,
    canvas.height / img.height
  );

  const x = (canvas.width - img.width * scale) / 2;
  const y = (canvas.height - img.height * scale) / 2;

  ctx.drawImage(
    img,
    0, 0, img.width, img.height,
    x, y, img.width * scale, img.height * scale
  );

  const stream = canvas.captureStream(30);

  const recorder = new MediaRecorder(stream, {
    mimeType: "video/webm"
  });

  const chunks = [];

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);
    video.src = url;
  };

  recorder.start();

  setTimeout(() => {
    recorder.stop();
  }, 5000);
};

img.onerror = () => {
  alert("Image failed (proxy may be down or blocked)");
};
</script>

</body>
</html>
